<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">v0.1.0 artifact package map</title>
  <desc id="desc">A map of the v0.1.0 artifact package organized into source benchmark, protocol inputs, collection branches, curation results, and inspection artifacts.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .column { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.3; }
      .header { fill: #111827; }
      .headerText { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .item { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1; }
      .itemText { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .note { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .arrow { fill: none; stroke: #475569; stroke-width: 2; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="560"/>
  <text x="64" y="58" class="title">v0.1.0 Artifact Package</text>
  <text x="64" y="86" class="subtitle">Small enough to inspect in GitHub, complete enough to replay the data loop.</text>

  <g transform="translate(64 125)">
    <rect class="column" width="190" height="330" rx="18"/>
    <path class="header" d="M 0 18 Q 0 0 18 0 H 172 Q 190 0 190 18 V 58 H 0 Z"/>
    <text x="24" y="37" class="headerText">Source benchmark</text>
    <rect class="item" x="18" y="86" width="154" height="44" rx="10"/>
    <text x="34" y="113" class="itemText">reference image</text>
    <rect class="item" x="18" y="145" width="154" height="44" rx="10"/>
    <text x="34" y="172" class="itemText">score sheets</text>
    <rect class="item" x="18" y="204" width="154" height="44" rx="10"/>
    <text x="34" y="231" class="itemText">comparison table</text>
    <rect class="item" x="18" y="263" width="154" height="44" rx="10"/>
    <text x="34" y="290" class="itemText">limitations note</text>
  </g>

  <g transform="translate(285 125)">
    <rect class="column" width="190" height="330" rx="18"/>
    <path class="header" d="M 0 18 Q 0 0 18 0 H 172 Q 190 0 190 18 V 58 H 0 Z"/>
    <text x="24" y="37" class="headerText">Protocol inputs</text>
    <rect class="item" x="18" y="86" width="154" height="44" rx="10"/>
    <text x="34" y="113" class="itemText">shared prompts</text>
    <rect class="item" x="18" y="145" width="154" height="44" rx="10"/>
    <text x="34" y="172" class="itemText">2s action lists</text>
    <rect class="item" x="18" y="204" width="154" height="44" rx="10"/>
    <text x="34" y="231" class="itemText">Genie3 notes</text>
    <rect class="item" x="18" y="263" width="154" height="44" rx="10"/>
    <text x="34" y="290" class="itemText">MG3 CSVs</text>
  </g>

  <g transform="translate(506 125)">
    <rect class="column" width="190" height="330" rx="18"/>
    <path class="header" d="M 0 18 Q 0 0 18 0 H 172 Q 190 0 190 18 V 58 H 0 Z"/>
    <text x="24" y="37" class="headerText">Rollout branches</text>
    <rect class="item" x="18" y="103" width="154" height="58" rx="10"/>
    <text x="34" y="128" class="itemText">MG3</text>
    <text x="34" y="149" class="note">action-controlled</text>
    <rect class="item" x="18" y="191" width="154" height="58" rx="10"/>
    <text x="34" y="216" class="itemText">MG3</text>
    <text x="34" y="237" class="note">prompt-injected</text>
    <rect class="item" x="18" y="279" width="154" height="36" rx="10"/>
    <text x="34" y="302" class="note">Genie3 pending</text>
  </g>

  <g transform="translate(727 125)">
    <rect class="column" width="190" height="330" rx="18"/>
    <path class="header" d="M 0 18 Q 0 0 18 0 H 172 Q 190 0 190 18 V 58 H 0 Z"/>
    <text x="24" y="37" class="headerText">Curation results</text>
    <rect class="item" x="18" y="86" width="154" height="44" rx="10"/>
    <text x="34" y="113" class="itemText">validity gates</text>
    <rect class="item" x="18" y="145" width="154" height="44" rx="10"/>
    <text x="34" y="172" class="itemText">motion audit</text>
    <rect class="item" x="18" y="204" width="154" height="44" rx="10"/>
    <text x="34" y="231" class="itemText">run manifests</text>
    <rect class="item" x="18" y="263" width="154" height="44" rx="10"/>
    <text x="34" y="290" class="itemText">auto-label JSONL</text>
  </g>

  <g transform="translate(948 125)">
    <rect class="column" width="190" height="330" rx="18"/>
    <path class="header" d="M 0 18 Q 0 0 18 0 H 172 Q 190 0 190 18 V 58 H 0 Z"/>
    <text x="24" y="37" class="headerText">Inspection</text>
    <rect class="item" x="18" y="86" width="154" height="44" rx="10"/>
    <text x="34" y="113" class="itemText">contact sheets</text>
    <rect class="item" x="18" y="145" width="154" height="44" rx="10"/>
    <text x="34" y="172" class="itemText">sampled frames</text>
    <rect class="item" x="18" y="204" width="154" height="44" rx="10"/>
    <text x="34" y="231" class="itemText">result tables</text>
    <rect class="item" x="18" y="263" width="154" height="44" rx="10"/>
    <text x="34" y="290" class="itemText">source notes</text>
  </g>

  <path class="arrow" d="M 254 290 H 275"/>
  <path class="arrow" d="M 475 290 H 496"/>
  <path class="arrow" d="M 696 290 H 717"/>
  <path class="arrow" d="M 917 290 H 938"/>
</svg>
