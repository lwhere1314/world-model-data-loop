<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">World model data loop overview</title>
  <desc id="desc">A data loop from human anchors to protocol design, rollout collection, curation gates, evaluation, artifacts, and revised protocols.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .panel-accent { fill: #eef6ff; stroke: #8ab4f8; stroke-width: 1.5; }
      .panel-warm { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; }
      .panel-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; letter-spacing: .04em; text-transform: uppercase; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 2.6; marker-end: url(#arrow); }
      .feedback { fill: none; stroke: #0f766e; stroke-width: 2.4; stroke-dasharray: 7 7; marker-end: url(#arrowFeedback); }
      .caption { font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowFeedback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="640"/>

  <text x="70" y="62" class="tiny">WORLD MODEL DATA LOOP</text>
  <text x="70" y="96" class="label">Failure case -> data loop -> reusable artifacts</text>

  <rect class="panel-accent" x="70" y="145" width="250" height="130" rx="18"/>
  <text x="95" y="185" class="label">Human anchors</text>
  <text x="95" y="218" class="small">Reference image</text>
  <text x="95" y="244" class="small">Target identity</text>
  <text x="95" y="270" class="small">Failure modes</text>

  <rect class="panel" x="365" y="145" width="250" height="130" rx="18"/>
  <text x="390" y="185" class="label">Protocol design</text>
  <text x="390" y="218" class="small">Shared prompt</text>
  <text x="390" y="244" class="small">2s action schedule</text>
  <text x="390" y="270" class="small">Revisit checkpoints</text>

  <rect class="panel" x="660" y="145" width="250" height="130" rx="18"/>
  <text x="685" y="185" class="label">Rollout collection</text>
  <text x="685" y="218" class="small">Genie3 protocol</text>
  <text x="685" y="244" class="small">Matrix-Game CSV</text>
  <text x="685" y="270" class="small">Video + metadata</text>

  <rect class="panel-warm" x="660" y="365" width="250" height="130" rx="18"/>
  <text x="685" y="405" class="label">Curation gates</text>
  <text x="685" y="438" class="small">Validity checks</text>
  <text x="685" y="464" class="small">Action-following audit</text>
  <text x="685" y="490" class="small">Hard negatives</text>

  <rect class="panel" x="365" y="365" width="250" height="130" rx="18"/>
  <text x="390" y="405" class="label">Evaluation</text>
  <text x="390" y="438" class="small">Text consistency</text>
  <text x="390" y="464" class="small">Storefront identity</text>
  <text x="390" y="490" class="small">Layout memory</text>

  <rect class="panel-green" x="70" y="365" width="250" height="130" rx="18"/>
  <text x="95" y="405" class="label">Artifacts</text>
  <text x="95" y="438" class="small">Score sheets</text>
  <text x="95" y="464" class="small">Manifests</text>
  <text x="95" y="490" class="small">Contact sheets</text>

  <path class="arrow" d="M 320 210 H 355"/>
  <path class="arrow" d="M 615 210 H 650"/>
  <path class="arrow" d="M 785 275 V 355"/>
  <path class="arrow" d="M 660 430 H 625"/>
  <path class="arrow" d="M 365 430 H 330"/>
  <path class="feedback" d="M 195 365 C 170 315 170 300 210 300 H 1020 C 1085 300 1085 210 920 210"/>

  <text x="900" y="333" class="caption">revised protocols</text>
  <text x="900" y="356" class="caption">from hard negatives</text>
</svg>
